name: Test macOS

on:
  push:
    paths-ignore:
      - "README.md"

  workflow_dispatch:

  # run the workflow every day at 12am
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotfiles
        run: make all
